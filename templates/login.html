<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auezov Parking — Login</title>

    <link rel="icon" type="image/png" href="/static/img/favicon.png" />
    <link rel="stylesheet" href="/static/style.css" />

    <style>
      body.login-page {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: Inter, Arial, sans-serif;
        background:
          linear-gradient(rgba(2, 6, 23, 0.62), rgba(2, 6, 23, 0.84)),
          url("/static/img/login-bg.jpg") center/cover no-repeat;
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 18% 45%,
            rgba(56, 189, 248, 0.28),
            transparent 28%
          ),
          radial-gradient(
            circle at 88% 88%,
            rgba(34, 197, 94, 0.2),
            transparent 30%
          );
      }

      .login-wrapper {
        position: relative;
        z-index: 2;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: 13%;
      }

      .premium-login {
        width: 540px;
        padding: 56px 52px;
        border-radius: 36px;
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 0 75px rgba(56, 189, 248, 0.25),
          0 0 140px rgba(34, 197, 94, 0.1);
        animation: cardFloat 5s ease-in-out infinite;
      }

      @keyframes cardFloat {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
        100% {
          transform: translateY(0);
        }
      }

      .login-logo {
        display: flex;
        align-items: center;
        gap: 22px;
        margin-bottom: 34px;
      }

      .login-logo img {
        width: 92px;
        height: 92px;
        object-fit: contain;
        border-radius: 24px;
        background: white;
        padding: 8px;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.16);
      }

      .login-logo h1 {
        margin: 0;
        color: white;
        font-size: 46px;
        line-height: 1;
        letter-spacing: -1px;
      }

      .login-logo span {
        color: #9fb4cc;
        font-size: 17px;
      }

      .login-subtitle {
        color: #b6c7dc;
        margin-bottom: 34px;
        line-height: 1.7;
        font-size: 18px;
        font-weight: 600;
      }

      .login-input {
        width: 100%;
        height: 68px;
        border-radius: 20px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: rgba(2, 6, 23, 0.78);
        color: white;
        font-size: 18px;
        padding: 0 22px;
        margin-bottom: 20px;
        outline: none;
        transition: 0.25s;
        box-sizing: border-box;
      }

      .login-input:focus {
        border-color: #38bdf8;
        box-shadow:
          0 0 0 4px rgba(56, 189, 248, 0.15),
          0 0 28px rgba(56, 189, 248, 0.18);
      }

      .password-wrap {
        position: relative;
        width: 100%;
      }

      .password-wrap .login-input {
        padding-right: 64px;
      }

      .password-eye {
        position: absolute;
        right: 14px;
        top: 34px;
        transform: translateY(-50%);
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 14px;
        background: rgba(56, 189, 248, 0.14);
        color: white;
        cursor: pointer;
        font-size: 19px;
      }

      .password-eye:hover {
        background: rgba(56, 189, 248, 0.26);
      }

      .login-btn {
        width: 100%;
        height: 68px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 20px;
        font-weight: 900;
        color: white;
        background: linear-gradient(135deg, #0ea5e9, #22c55e);
        transition: 0.25s;
        box-shadow: 0 14px 38px rgba(14, 165, 233, 0.3);
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.38);
      }

      .error-box {
        margin-bottom: 18px;
        padding: 15px;
        border-radius: 15px;
        color: #fecaca;
        background: rgba(239, 68, 68, 0.13);
        border: 1px solid rgba(239, 68, 68, 0.28);
      }

      @media (max-width: 900px) {
        .login-wrapper {
          justify-content: center;
          padding: 24px;
        }

        .premium-login {
          width: min(540px, 100%);
          padding: 42px 32px;
        }

        .login-logo h1 {
          font-size: 36px;
        }
      }
    </style>
  </head>

  <body class="login-page">
    <div class="login-overlay"></div>

    <div class="login-wrapper">
      <form class="premium-login" method="POST">
        <div class="login-logo">
          <img src="/static/img/logo.png" alt="Auezov logo" />
          <div>
            <h1>Auezov Parking</h1>
            <span>Smart Parking System</span>
          </div>
        </div>

        <div class="login-subtitle">
          Мұхтар Әуезов университетінің интеллектуалды автотұрақ жүйесі
        </div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <input
          type="text"
          name="login"
          placeholder="Логин"
          class="login-input"
          autocomplete="off"
          required
        />

        <div class="password-wrap">
          <input
            id="passwordInput"
            type="password"
            name="password"
            placeholder="Пароль"
            class="login-input"
            required
          />

          <button
            id="passwordEye"
            class="password-eye"
            type="button"
            onclick="togglePassword()"
          >
            👁
          </button>
        </div>

        <button class="login-btn" type="submit">Кіру</button>
      </form>
    </div>

    <script>
      function togglePassword() {
        const input = document.getElementById("passwordInput");
        const eye = document.getElementById("passwordEye");

        if (input.type === "password") {
          input.type = "text";
          eye.textContent = "🙈";
        } else {
          input.type = "password";
          eye.textContent = "👁";
        }
      }
    </script>
  </body>
</html>
