<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR | Auezov Parking</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #123456, #020617);
        color: white;
        font-family: Arial, sans-serif;
      }

      .box {
        width: min(760px, 94%);
        padding: 34px;
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.94);
        border: 1px solid rgba(56, 189, 248, 0.25);
        box-shadow: 0 0 60px rgba(56, 189, 248, 0.25);
        text-align: center;
      }

      .top-links {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .top-links a {
        color: #dbeafe;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(56, 189, 248, 0.12);
        border: 1px solid rgba(56, 189, 248, 0.18);
        font-weight: 800;
        font-size: 13px;
      }

      .qr-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(240px, 1fr));
        gap: 28px;
        margin-top: 25px;
      }

      .qr-card {
        padding: 22px;
        border-radius: 24px;
        background: rgba(2, 6, 23, 0.55);
        border: 1px solid rgba(56, 189, 248, 0.18);
      }

      .qr-card img {
        width: 220px;
        height: 220px;
        border-radius: 18px;
        background: white;
        padding: 10px;
      }

      .qr-card p {
        color: #bfdbfe;
        font-weight: 700;
      }

      @media (max-width: 700px) {
        .qr-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="top-links">
        <a href="/dashboard">АРМ</a>
        <a href="/journal">Журнал</a>
        <a href="/payments">Платежи</a>
        <a href="/pay">Төлем беті</a>
      </div>

      <h1>Auezov Parking QR</h1>

      <div class="qr-grid">
        <div class="qr-card">
          <h3>Системаға кіру</h3>
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://cam.auezovparking.xyz/login"
            alt="Login QR"
          />
          <p>Логин / пароль арқылы кіру</p>
        </div>

        <div class="qr-card">
          <h3>QR Төлем</h3>
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://cam.auezovparking.xyz/pay"
            alt="Payment QR"
          />
          <p>Номер жазып төлем жасау</p>
        </div>
      </div>
    </div>
  </body>
</html>
